<!DOCTYPE html>
<html>

<head>

<title>Birthday Surprise for Siddhi</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:linear-gradient(135deg,#fde2ff,#e8f6ff,#fff3e6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* main card */

.card{
background:white;
padding:40px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
width:320px;
}

/* pages */

.page{
display:none;
}

.active{
display:block;
}

/* text */

h1{
color:#6b5ca5;
}

p{
color:#555;
line-height:1.5;
}

/* buttons */

button{
margin-top:20px;
padding:12px 24px;
border:none;
border-radius:25px;
background:#c8a2ff;
color:white;
font-size:16px;
cursor:pointer;
}

/* bear */

.bear{
font-size:70px;
margin-bottom:10px;
}

/* cake */

.cake{
font-size:90px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* gift */

.gift{
font-size:80px;
cursor:pointer;
}

/* video */

video{
border-radius:15px;
margin-top:10px;
}

/* mini cards */

.card-container{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
}

.mini-card{
width:80px;
height:80px;
background:#f3e8ff;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
font-size:14px;
color:#6b5ca5;
transition:0.3s;
}

.mini-card:hover{
transform:scale(1.05);
background:#e6d6ff;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<div class="card">

<!-- PAGE 1 -->

<div class="page active" id="page1">

<div class="bear">🧸</div>

<h1>Happy Birthday Siddhi 🎉</h1>

<p>A little surprise is waiting for you ✨</p>

<button onclick="nextPage(2)">Start the Surprise 🎁</button>

</div>

<!-- PAGE 2 -->

<div class="page" id="page2">

<h1>Make a Wish 🎂</h1>

<div class="cake">🎂</div>

<button onclick="nextPage(3)">Next ➜</button>

</div>

<!-- PAGE 3 -->

<div class="page" id="page3">

<h1>Tap the Gift 🎁</h1>

<div class="gift" onclick="openGift()">🎁</div>

</div>

<!-- PAGE 4 -->

<div class="page" id="page4">

<h1>For You 💗</h1>

<video width="220" controls>
<source src="video.mp4" type="video/mp4">
</video>

<div style="margin-top:20px; font-size:16px; color:#6b5ca5;">
🫶 You are the sweetest person ever
</div>

<button onclick="nextPage(5)">Open Final Message 💌</button>

</div>

<!-- FINAL PAGE WITH TAP CARDS -->

<div class="page" id="page5">

<div class="bear">🧸💖</div>

<h1>Lots of Love for You!</h1>

<p>Tap the cards 💌</p>

<div class="card-container">

<div class="mini-card" onclick="showMsg(1)">Tap me 💌</div>
<div class="mini-card" onclick="showMsg(2)">Tap me 💌</div>
<div class="mini-card" onclick="showMsg(3)">Tap me 💌</div>

</div>

<p id="messageBox" style="margin-top:20px; color:#6b5ca5;"></p>

<button onclick="location.reload()">Replay 🔁</button>

</div>

</div>

<script>

/* page switch */

function nextPage(n){
document.querySelector(".active").classList.remove("active");
document.getElementById("page"+n).classList.add("active");
}

/* gift */

function openGift(){

confetti({
particleCount:200,
spread:120
});

setTimeout(()=>{
nextPage(4);
},800);

}

/* messages */

function showMsg(n){

let msg = "";

if(n==1){
msg = "💖 You mean so much to me";
}

if(n==2){
msg = "🌸 You make life more beautiful";
}

if(n==3){
msg = "✨ Stay happy always bbggg";
}

document.getElementById("messageBox").innerHTML = msg;

}

</script>

</body>
</html>
